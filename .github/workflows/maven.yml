name: Maven CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root123456
          MYSQL_DATABASE: meeting_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup JDK 1.8
        uses: actions/setup-java@v3
        with:
          java-version: '1.8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Initialize MySQL database
        run: |
          mysql -h 127.0.0.1 -u root -proot123456 -e "source sql/init.sql"

      - name: Run tests
        run: mvn test
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: meeting_db
          DB_USER: root
          DB_PASSWORD: root123456

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v3
        with:
          name: meeting-management.jar
          path: target/*.jar
          retention-days: 7

  docker:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: ${{ secrets.DOCKER_USERNAME }}/meeting-management:latest

      - name: Upload JAR artifact
        uses: actions/download-artifact@v3
        with:
          name: meeting-management.jar

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/meeting-management:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/meeting-management:latest
